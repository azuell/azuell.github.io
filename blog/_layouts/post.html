<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} · AZuell</title>
  
  <meta name="description" content="{{ page.title }}">

  <script type="application/ld+json">
    {
      "@context" : "https://schema.org",
      "@type" : "BlogPosting",
      "headline" : {{ page.title | jsonify }},
      "datePublished" : "{{ page.date | date_to_xmlschema }}",
      "url" : "{{ site.url }}{{ page.url }}",
      "mainEntityOfPage" : "{{ site.url }}{{ page.url }}",
      "author" : {
        "@type" : "Person",
        "name" : "{{ site.title }}"
      }
    }
  </script>

  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  
  <link rel="stylesheet" href="/blog/blog.css">
  <link rel="stylesheet" href="/style.css">
</head>

<body class="blog-body">
  <header class="blog-header">
    <a href="/index.html" class="blog-home-link">← Home</a>
    <a href="/blog/" class="blog-home-link">All posts</a>
  </header>

  <article class="blog-post">
    <h1>{{ page.title }}</h1>
    <p class="blog-date">{{ page.date | date: "%B %d, %Y" }}</p>
    <div class="blog-content">
      {{ content }}
    </div>
  </article>

  <footer class="footer">
    <p>&copy; 2026 Amy Zuell</p>
  </footer>

  <script src="/links.js" type="text/javascript"></script>
</body>
</html>
